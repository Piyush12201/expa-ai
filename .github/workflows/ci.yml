name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: expa_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d expa_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      GROQ_API_KEY: test-key
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/expa_test?schema=public
      JWT_SECRET: test-secret-please-change
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Push test schema
        run: npm run db:push

      - name: Run tests
        run: npm run test

      - name: Build app
        run: npm run build
